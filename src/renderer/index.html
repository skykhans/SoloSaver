<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoloSaver</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=7" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">SoloSaver Web Service</p>
          <h1>短视频素材下载</h1>
        </div>
      </header>

      <section class="download-panel" aria-labelledby="download-title">
        <div class="panel-heading">
          <div>
            <h2 id="download-title">粘贴提取</h2>
            <p>粘贴抖音或 X 分享链接，先提取视频和图片地址，再按需下载。</p>
          </div>
        </div>

        <div class="download-grid">
          <textarea id="batch-input" placeholder="粘贴抖音分享文本或 X 链接，支持多行"></textarea>
          <div class="action-stack">
            <button id="add-batch-btn" class="green-btn" type="button">开始提取</button>
            <button id="paste-btn" class="green-btn alt" type="button">粘贴</button>
            <button id="clear-input-btn" class="green-btn ghost" type="button">清空</button>
          </div>
        </div>
        <p class="copyright-note">视频归平台及作者所有，本工具仅保存链接与任务信息，不内置广告。</p>
      </section>

      <section class="workspace-panel">
        <div class="workspace-top">
          <div>
            <h2>任务工作区</h2>
            <p>查看提取结果和任务状态。</p>
          </div>
          <div class="view-tabs" role="tablist" aria-label="主视图">
            <button class="view-tab active" data-view="preview" type="button">预览</button>
            <button class="view-tab" data-view="tasks" type="button">任务</button>
          </div>
        </div>

        <div class="view-panel" data-view-panel="preview">
          <section class="preview-layout">
            <div class="preview-media">
              <div class="tabs">
                <button id="tab-video" class="tab-btn active" data-tab="video" type="button">视频</button>
                <button id="tab-image" class="tab-btn" data-tab="image" type="button">图片</button>
              </div>
              <div class="result-preview">
                <div id="media-stage" class="fake-video">
                  <img id="preview-thumb" class="preview-thumb hidden" alt="thumbnail" />
                  <video id="preview-video" class="preview-video hidden" controls preload="metadata"></video>
                  <div class="play-indicator" id="play-indicator">▶</div>
                  <div class="duration" id="preview-status">未开始</div>
                </div>
                <div id="image-grid" class="image-grid"></div>
                <button id="toggle-images-btn" class="green-btn ghost small hidden" type="button">显示更多图片</button>
              </div>
            </div>

            <aside class="preview-info">
              <div class="detail-hero">
                <div class="detail-meta">
                  <h3 id="preview-title">资源标题预览</h3>
                  <p id="preview-subtitle">等待导入分享文本...</p>
                </div>
              </div>
              <div class="meta-strip">
                <span id="preview-url">等待解析链接...</span>
              </div>
              <div id="file-meta" class="file-meta">等待提取结果...</div>
              <div class="detail-actions">
                <button id="copy-link-btn" class="green-btn ghost" type="button">复制链接</button>
                <button id="download-video-btn" class="green-btn ghost" type="button">下载视频</button>
                <button id="download-all-images-btn" class="green-btn" type="button">批量下载图片</button>
              </div>
            </aside>
          </section>
        </div>

        <div class="view-panel hidden" data-view-panel="tasks">
          <section class="task-panel">
            <div class="task-panel-header">
              <div>
                <h2>任务列表</h2>
                <p id="task-stats">总计 0</p>
              </div>
              <div class="task-filters" role="tablist" aria-label="任务筛选">
                <button id="filter-all" class="filter-btn active" data-filter="all" type="button">全部</button>
                <button id="filter-failed" class="filter-btn" data-filter="failed" type="button">失败</button>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>任务</th>
                    <th>内容</th>
                  </tr>
                </thead>
                <tbody id="task-tbody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div id="image-modal" class="image-modal hidden" aria-hidden="true">
      <button id="image-modal-close" class="image-modal-close" type="button">关闭</button>
      <img id="image-modal-img" alt="preview" />
      <div id="image-modal-caption" class="image-modal-caption"></div>
    </div>

    <script src="./renderer.js?v=7"></script>
  </body>
</html>
